#FILE kscao_lgs.conf
# Keck SCAO LGS circa 2023 (pre-KAPA)

__reset__         		#replace all previous entries.
__default__	      		#this file contains default setup.

#defines simulation parameters.
include     	= "keck_sim.conf"

#####
##### DM Properties
#####
include         = "dm_none.conf"
include         = "keck_ASM_tno.conf"   # ASM Deformable Mirror
include         = "keck_DM2.conf"       # Deformable Mirror 2
include         = "keck_DM3.conf"       # Deformable Mirror 3


#####
##### Atmospheric profile - Hinz corrected
#####
include     	= "atm_mk13n50p_ground_detail.conf" #Mauna Kea 13N, Chun MK_OTP 'binned' model

# Wavefront sensor information. 
include     	= "keck_wfs_lgs_strap_lbwfs.conf"

# Including configurations for reconstruction (tomo/fitting)
include     	= "keck_recon.conf"

# For debugging purpose
include     	= "keck_dbg.conf"

# For DM fitting
include         = "keck_fit_mcao.conf"

##########
# VISMCAO OVERRIDES
##########
# WFS Configuration
powfs.nwfs = [8 3 1]

## Asterism Radius: 15" radius, 30" diamaeter asterism and corrected field.
wfs.thetax = [ 60  42.42  0 -42.42 -60 -42.42   0  42.42 30.   -30  15.    0  ]
wfs.thetay = [  0  42.42 60  42.42   0 -42.42 -60 -42.42 51.96   0 -25.98  0  ] 
fit.fov = 60 # diameter of fit FOV.

evl.thetax=[0  0  0  0  0  0  0  0  5  5  5  5  5  5  5  5 10 10 10 10 10 10 10 10  15 15 15 15 15 15 15 15 20 20 20 20 20 20 20 20 25 25 25 25 25 25 25 25 30 30 30 30 30 30 30 30 35 35 35 35 35 35 35 35]
evl.thetay=[0  5 10 15 20 25 30 35  0  5 10 15 20 25 30 35  0  5 10 15 20 25 30 35   0  5 10 15 20 25 30 35  0  5 10 15 20 25 30 35  0  5 10 15 20 25 30 35  0  5 10 15 20 25 30 35  0  5 10 15 20 25 30 35]
evl.psfsize = [256      256      256      256      256      256      256      256      256]

## Guide Star Brightness: mag, magbkgrnd, telthruput, atmthruput, bzero
powfs.mag = [7.0 8.0 8.0]
powfs.magbkgrnd = [20.3 13.4 20.3]   # R-band background in mag/sq.arcsec
powfs.telthruput = [0.5 0.5 0.05]  # 0.36*0.88 as in maos_utils. Tuned to match siglev.
powfs.atmthruput = 1.00  # Captured in telescope throughput.
